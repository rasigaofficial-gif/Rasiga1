<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f97316">
  <title>Rasiga — Rate, Review & Discover Indian Music</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=DM+Serif+Display&family=Dancing+Script:wght@700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <a href="#page-container" class="skip-link">Skip to content</a>
  <!-- Startup Loading Screen -->
  <div id="startup-loader"
    style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-color); z-index:9999; display:flex; align-items:center; justify-content:center; transition:opacity 0.5s ease-out;">
    <div class="logo-loader"
      style="width:120px; height:120px; display:flex; align-items:center; justify-content:center; animation:pulse 1.5s infinite alternate;">
    </div>
  </div>

  <!-- Background Notes Animation -->
  <canvas id="music-canvas" aria-hidden="true"></canvas>

  <!-- Desktop/Tablet Top Navigation -->
  <nav class="top-nav">
    <div class="nav-inner" style="display:flex; align-items:center; width:100%;">
      <a href="#/" class="logo" style="display:flex; align-items:center; gap:0.5rem; text-decoration:none; margin-right: 2rem;">
        <div id="nav-logo" style="width: 44px; height: 44px; display:flex; align-items:center; justify-content:center;">
        </div>
        <span id="nav-title-text" style="font-size: 2rem;">RASIGA</span>
      </a>
      <div class="nav-links hide-on-mobile" style="align-items:center; gap: 0.5rem;">
        <a href="#/discover" class="nav-link">Discover</a>
        <a href="#/charts" class="nav-link">Charts</a>
        <a href="#/leaderboards" class="nav-link">Leaderboards</a>
      </div>
      
      <div style="flex:1;"></div>
      
      <div style="display:flex; gap:1rem; align-items:center;">
        <div class="nav-links hide-on-mobile" style="align-items:center; gap: 0.5rem; white-space: nowrap;">
          <a href="#/my-reviews" class="nav-link" style="white-space: nowrap;">My Reviews</a>
          <a href="#/profile" class="nav-link" style="white-space: nowrap;">Profile</a>
        </div>

        <div class="search-container hide-on-mobile" style="max-width: 300px; width: 100%;">
          <input type="text" id="global-search-input" aria-label="Search songs, artists, or movies" placeholder="Search songs..." oninput="if(window.RasigaApp && RasigaApp.executeGlobalSearch) RasigaApp.executeGlobalSearch(this.value)">
          <div id="global-search-filter" class="custom-dropdown-container" data-value="all" onclick="this.classList.toggle('open')">
            <div class="custom-dropdown-selected" style="background:transparent; border:none; padding:0 0.5rem;">
              <span class="selected-text">All</span>
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
            </div>
            <div class="custom-dropdown-menu">
              <div class="custom-dropdown-item" onclick="event.stopPropagation(); RasigaApp.setSearchFilter('all', 'All', 'global-search-filter', 'global-search-input')">All</div>
              <div class="custom-dropdown-item" onclick="event.stopPropagation(); RasigaApp.setSearchFilter('artist', 'Artist', 'global-search-filter', 'global-search-input')">Artist</div>
              <div class="custom-dropdown-item" onclick="event.stopPropagation(); RasigaApp.setSearchFilter('song', 'Song', 'global-search-filter', 'global-search-input')">Song</div>
            </div>
          </div>
          <div class="search-icon" id="top-search-icon"></div>
        </div>

        <button class="icon-btn" id="theme-toggle" aria-label="Toggle Theme" title="Toggle Theme"></button>
      </div>
    </div>
  </nav>

  <!-- Dynamic Page Content Container -->
  <main id="page-container"></main>

  <!-- Global Desktop Footer -->
  <footer class="desktop-footer">
    <div class="footer-inner">
      <div class="footer-copy">
        &copy; 2026 Rasiga. All rights reserved.
      </div>
      <div class="footer-links">
        <a href="#/contact">Contact Us</a>
        <a href="#/donate">Donate</a>
        <a href="#/privacy">Privacy Policy</a>
      </div>
    </div>
  </footer>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner" id="mobile-nav-container">
      <!-- Icons injected by JS or hardcoded inline -->
    </div>
  </nav>

  <!-- External Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- JS Modules loaded synchronously for this no-build SPA -->
  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/badges.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages.js"></script>
  <script src="copy.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
  <script src="js/logo-svg.js"></script>

  <script>
    // Inject mobile nav icons dynamically since we have the Icons module
    document.addEventListener('DOMContentLoaded', () => {
      const mn = document.getElementById('mobile-nav-container');
      mn.innerHTML = `
        <a href="#/" class="bnav-item active" aria-label="Home">${Icons.get('home')}</a>
        <a href="#/discover" class="bnav-item" aria-label="Search">${Icons.get('search')}</a>
        <a href="#/charts" class="bnav-item" aria-label="Charts">${Icons.get('barChart')}</a>
        <a href="#/leaderboards" class="bnav-item" aria-label="Leaderboards">${Icons.get('trophy')}</a>
        <a href="#/profile" class="bnav-item" aria-label="Profile">${Icons.get('user')}</a>
      `;
      // Call router link update right away
      if (window.RasigaRouter) window.RasigaRouter.updateNavLinks(location.hash || '#/');

      // Inject search icon
      const searchIcon = document.getElementById('top-search-icon');
      if (searchIcon && window.Icons) {
        searchIcon.innerHTML = Icons.get('search', {width: 16, height: 16});
      }
    });
  </script>
  <div id="global-search-results" class="glass"></div>
</body>

</html>
